<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema RH - Cadastro e Gestão</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="container" id="areaFicha">
    <header class="form-header">
        <h2>Cadastro de Funcionário</h2>
        <p class="subtitle no-print">Gerenciamento completo de colaboradores.</p>
    </header>

    <form id="formFuncionario">
        <div class="form-grid">
            <div class="input-box full-width">
                <label>Nome Completo *</label>
                <input type="text" name="nome" id="nome" required>
            </div>
            <div class="input-box">
                <label>CPF * (Apenas números)</label>
                <input type="text" name="cpf" id="cpf" required maxlength="14">
            </div>
            <div class="input-box">
                <label>Data de Nascimento *</label>
                <input type="date" name="nascimento" id="nascimento" required>
            </div>
            <div class="input-box">
                <label>RG</label>
                <input type="text" name="rg" id="rg">
            </div>
            <div class="input-box">
                <label>Estado Civil</label>
                <select name="estado_civil" id="estado_civil">
                    <option value="Solteiro">Solteiro(a)</option>
                    <option value="Casado">Casado(a)</option>
                    <option value="Divorciado">Divorciado(a)</option>
                    <option value="Viuvo">Viúvo(a)</option>
                </select>
            </div>
            <div class="input-box">
                <label>Filhos</label>
                <input type="number" name="filhos" id="filhos" min="0" value="0">
            </div>
            <div class="input-box">
                <label>Telefone</label>
                <input type="text" name="telefone" id="telefone" maxlength="15">
            </div>
            <div class="input-box">
                <label>E-mail</label>
                <input type="email" name="email" id="email">
            </div>
            <div class="input-box">
                <label>Cargo</label>
                <select name="cargo" id="cargo">
                    <option value="Pedreiro">Pedreiro</option>
                    <option value="Servente">Servente</option>
                    <option value="Mestre de Obras">Mestre de Obras</option>
                    <option value="Ajudante">Ajudante</option>
                    <option value="Eletricista">Eletricista</option>
                    <option value="Marceneiro">Marceneiro</option>
                    <option value="Secretário(a)">Secretário(a)</option>
                    <option value="Diretor(a)">Diretor(a)</option>
                    <option value="Agente Administrativo">Agente Administrativo</option>
                    <option value="Auxiliar de Serviços Gerais">Auxiliar de Serviços Gerais</option>
                </select>
            </div>
            <div class="input-box">
                <label>Salário Base</label>
                <input type="text" name="salario" id="salario" placeholder="R$ 0,00">
            </div>
            <div class="input-box full-width">
                <label>Endereço</label>
                <input type="text" name="endereco" id="endereco">
            </div>
        </div>

        <div class="actions no-print">
            <button type="submit" class="btn btn-save">Salvar</button>
            <button type="button" class="btn btn-pdf" onclick="exportarPDF()">PDF</button>
            <button type="button" class="btn btn-print" onclick="window.print()">Imprimir</button>
            <button type="reset" class="btn btn-clear">Limpar</button>
            <button type="button" class="btn btn-exit" onclick="sair()">Sair</button>
        </div>
    </form>

    <section class="search-section no-print">
        <h3>Consulta de Registros</h3>
        <div class="search-box">
            <input type="text" id="inputBusca" placeholder="Nome ou CPF">
            <button type="button" onclick="buscarFuncionarios()" class="btn-print">Buscar</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th class="hide-mobile">Cargo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </section>
</div>

<div id="loginModal" class="modal no-print">
    <div class="modal-content">
        <h4>Autenticação</h4>
        <input type="password" id="adminKey" placeholder="Senha para excluir">
        <div class="modal-btns">
            <button onclick="confirmarExclusao()" class="btn-save">Confirmar</button>
            <button onclick="fecharLogin()" class="btn-exit">Cancelar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
